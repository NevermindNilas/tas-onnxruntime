name: Build ONNX Runtime Dual EP

on:
  schedule:
    - cron: '0 0 1,15 * *' # Run daily at midnight
  workflow_dispatch:
    inputs:
      ort_version:
        description: 'ONNX Runtime version to build (e.g., v1.20.1)'
        required: false
        default: ''

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      ort_version: ${{ steps.compare.outputs.ort_version }}
    steps:
      - name: Compare Versions
        id: compare
        run: |
          # Get latest release from microsoft/onnxruntime
          LATEST_ORT=$(curl -s https://api.github.com/repos/microsoft/onnxruntime/releases/latest | jq -r .tag_name)

          # If manual version provided, use it
          if [ "${{ github.event.inputs.ort_version }}" != "" ]; then
            LATEST_ORT="${{ github.event.inputs.ort_version }}"
          fi

          # Get latest release from current repo
          # Note: If no releases exist, this might fail or return null. Handle it.
          CURRENT_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name || echo "none")

          echo "Latest ORT available: $LATEST_ORT"
          echo "Current repository release: $CURRENT_RELEASE"

          if [ "$LATEST_ORT" != "$CURRENT_RELEASE" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "ort_version=$LATEST_ORT" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build_windows:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.13'
            freethreaded: false
          - python-version: '3.14'
            freethreaded: false
          - python-version: '3.13'
            freethreaded: true
          - python-version: '3.14'
            freethreaded: true
    continue-on-error: ${{ matrix.freethreaded }}
    steps:
      - name: Checkout ORT
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: ${{ needs.check_version.outputs.ort_version }}
          submodules: recursive
          path: onnxruntime

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          freethreaded: ${{ matrix.freethreaded }}

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Try pinned openvino first, fall back to latest available (free-threaded
          # variants may not have an openvino wheel for the pinned version).
          pip install wheel "numpy==2.3.5" flatbuffers packaging protobuf sympy mpmath humanfriendly pyreadline3 coloredlogs
          if (-not (pip install "openvino==2026.1.0")) {
            Write-Host "Pinned openvino==2026.1.0 unavailable for this Python; trying latest."
            pip install openvino
          }

      - name: Build Windows Wheel
        shell: pwsh
        run: |
          # Logic from run_build.py
          $ov_path = python -c "import openvino; import os; print(os.path.dirname(openvino.__file__))"
          $env:OpenVINO_DIR = Join-Path $ov_path "cmake"
          $env:PATH = "$(Join-Path $ov_path "libs");" + $env:PATH

          python onnxruntime/tools/ci_build/build.py `
            --build_dir build `
            --config Release `
            --build_wheel `
            --build_shared_lib `
            --use_openvino GPU `
            --use_dml `
            --parallel `
            --skip_tests `
            --compile_no_warning_as_error

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-windows-${{ matrix.python-version }}${{ matrix.freethreaded && 't' || '' }}-wheel
          path: build/Release/Release/dist/*.whl
          if-no-files-found: warn

  build_linux:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.13'
            freethreaded: false
          - python-version: '3.14'
            freethreaded: false
          - python-version: '3.13'
            freethreaded: true
          - python-version: '3.14'
            freethreaded: true
    continue-on-error: ${{ matrix.freethreaded }}
    container:
      image: rocm/dev-ubuntu-24.04:latest
      options: --user root
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git cmake protobuf-compiler libprotobuf-dev curl ca-certificates software-properties-common build-essential
          # MIGraphX dev package ships migraphxConfig.cmake under /opt/rocm/lib/cmake.
          # Try the common package names; ROCm renamed it across versions.
          apt-get install -y migraphx-dev || apt-get install -y migraphx || apt-get install -y rocm-migraphx || true
          ls /opt/rocm/lib/cmake/migraphx 2>/dev/null || echo "warning: migraphx cmake config not found, build will fail"

      - name: Checkout ORT
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: ${{ needs.check_version.outputs.ort_version }}
          submodules: recursive
          path: onnxruntime

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          freethreaded: ${{ matrix.freethreaded }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel "numpy==2.3.5" flatbuffers packaging protobuf sympy mpmath humanfriendly coloredlogs
          # Free-threaded variants of openvino may not exist for the pinned version.
          # Try pinned, fall back to latest, otherwise skip (build step will fail loudly).
          if ! pip install "openvino==2026.1.0"; then
            echo "Pinned openvino==2026.1.0 unavailable for this Python; trying latest."
            pip install openvino || echo "No openvino wheel available for this Python."
          fi

      - name: Build Linux Wheel (MIGraphX + OpenVINO)
        run: |
          # Logic from run_build.py adapted for Linux/ROCm
          export CC=gcc
          export CXX=g++
          export OpenVINO_DIR=$(python -c "import openvino; import os; print(os.path.join(os.path.dirname(openvino.__file__), 'cmake'))")

          python onnxruntime/tools/ci_build/build.py \
            --build_dir build \
            --config Release \
            --build_wheel \
            --build_shared_lib \
            --use_openvino GPU \
            --use_migraphx \
            --migraphx_home /opt/rocm \
            --parallel 1 \
            --skip_tests \
            --compile_no_warning_as_error \
            --allow_running_as_root

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-linux-${{ matrix.python-version }}${{ matrix.freethreaded && 't' || '' }}-wheel
          path: build/Release/dist/*.whl
          if-no-files-found: warn

  create_release:
    needs: [check_version, build_windows, build_linux]
    if: ${{ always() && needs.check_version.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Wheels
        uses: actions/download-artifact@v4
        with:
          pattern: onnxruntime-*-wheel
          path: dist
          merge-multiple: true

      - name: List Wheels
        run: ls -la dist || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check_version.outputs.ort_version }}
          name: ONNX Runtime ${{ needs.check_version.outputs.ort_version }} (Dual EP)
          files: dist/*.whl
          body: |
            Automated build of ONNX Runtime with dual Execution Providers.
            - **Windows**: OpenVINO + DirectML (Python 3.13, 3.14; freethreaded best-effort)
            - **Linux**: OpenVINO + MIGraphX (Python 3.13, 3.14; freethreaded best-effort)
            - OpenVINO EP built with default device GPU; runtime can override via
              `device_type` provider option (CPU/GPU/NPU/AUTO/HETERO/MULTI).
            - Free-threaded (3.13t/3.14t) wheels only produced if upstream openvino
              ships a matching free-threaded wheel.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
